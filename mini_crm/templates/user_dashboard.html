<!DOCTYPE html>
<html>
<head>
    <title>User Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">

    <h2>User Dashboard</h2>
    {% if messages %}
        {% for message in messages %}
            <div class="alert alert-{{ message.tags }}">{{ message }}</div>
        {% endfor %}
    {% endif %}

    <div class="card p-3 mb-4">
        <form method="post">
            {% csrf_token %}
            <input class="form-control mb-2" name="name" placeholder="Lead Name">
            <input class="form-control mb-2" name="email" placeholder="Lead Email">
            <button class="btn btn-primary">Add Lead</button>
        </form>
    </div>

    <div class="card p-3">
        <h4>Your Leads</h4>

        <form method="get" class="mb-3 d-flex">
            <input type="text" name="q" value="{{ request.GET.q }}" class="form-control me-2" placeholder="Search...">
            <button class="btn btn-primary">Search</button>
        </form>

        <table class="table">
            <tr>
                <th>Name</th>
                <th>Email</th>
            </tr>

            {% for lead in leads %}
            <tr>
                <td>{{ lead.name }}</td>
                <td>{{ lead.email }}</td>
            </tr>
            {% endfor %}

        </table>
    </div>

    <a href="/logout/" class="btn btn-danger mt-3">Logout</a>

</div>

</body>
</html>
