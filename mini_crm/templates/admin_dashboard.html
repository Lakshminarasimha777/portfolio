<!DOCTYPE html>
<html>
<head>
    <title>Admin Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">

    <h2>Admin Dashboard</h2>
    {% if messages %}
        {% for message in messages %}
            <div class="alert alert-{{ message.tags }}">{{ message }}</div>
        {% endfor %}
    {% endif %}

    <div class="card p-3">
        <form method="get" class="mb-3 d-flex">
            <input type="text" name="q" value="{{ request.GET.q }}" class="form-control me-2" placeholder="Search...">
            <button class="btn btn-primary">Search</button>
        </form>
        
        <table class="table table-striped">
            <tr>
                <th>Name</th>
                <th>Email</th>
                <th>Action</th>
            </tr>

            {% for lead in leads %}
            <tr>
                <td>{{ lead.name }}</td>
                <td>{{ lead.email }}</td>
                <td>
                    <a href="/delete/{{ lead.id }}/" class="btn btn-danger btn-sm">Delete</a>
                </td>
            </tr>
            {% endfor %}

        </table>
    </div>

    <a href="/logout/" class="btn btn-dark mt-3">Logout</a>

</div>

</body>
</html>
