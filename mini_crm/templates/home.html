<!DOCTYPE html>
<html>
<head>
    <title>Mini CRM</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(135deg, #5f9cff, #b96bff);
            height: 100vh;
        }
        .card-box {
            border-radius: 15px;
            padding: 30px;
            background: white;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
        }
    </style>
</head>

<body class="d-flex justify-content-center align-items-center">

<div class="container text-center">
    <div class="card-box">

        <h1 class="mb-3">Client Lead Management System</h1>
        <p class="text-muted">Manage your leads efficiently and grow your business</p>

        <div class="mt-4">

            <div class="card p-3 mb-3">
                <h4>Lead User Portal</h4>
                <a href="/register/" class="btn btn-primary mb-2">Register</a>
                <a href="/login/" class="btn btn-secondary">Login</a>
            </div>

            <div class="card p-3">
                <h4>Admin Dashboard</h4>
                <a href="/login/" class="btn btn-danger">Admin Login</a>
            </div>

        </div>

    </div>
</div>

</body>
</html>
